<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 로그인</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container auth-container">
    <div class="page-header-nav">
      <div>
        <h1>관리자 로그인</h1>
        <p class="subtitle">관리자 계정으로 로그인해야 대시보드에 접속할 수 있습니다.</p>
      </div>
      <a class="secondary-button" href="index.html">접수 페이지로 이동</a>
    </div>

    <section class="signup-section">
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label>관리자 이메일</label>
          <input type="email" name="email" placeholder="imbanker@naver.com" required />
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" name="password" placeholder="비밀번호" required />
        </div>
        <div class="form-actions">
          <button type="submit">로그인</button>
        </div>
        <p id="loginStatus" class="form-status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
