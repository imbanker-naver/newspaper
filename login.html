<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container auth-container">
    <div class="page-header-nav">
      <div>
        <h1>로그인</h1>
        <p class="subtitle">로그인 후 계정 권한에 맞는 화면으로 이동합니다.</p>
      </div>
    </div>

    <section class="signup-section">
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label>이메일</label>
          <input type="email" name="email" placeholder="example@domain.com" required />
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" name="password" placeholder="비밀번호" required />
        </div>
        <div class="form-actions">
          <button type="submit">로그인</button>
        </div>
        <p id="loginStatus" class="form-status" aria-live="polite"></p>
      </form>
    </section>

    <section class="signup-section" aria-labelledby="signupTitle">
      <h2 id="signupTitle">간단 회원가입</h2>
      <form id="signupForm" class="auth-form">
        <div class="form-group">
          <label>이름</label>
          <input type="text" name="name" placeholder="홍길동" required />
        </div>
        <div class="form-group">
          <label>이메일</label>
          <input type="email" name="email" placeholder="example@domain.com" required />
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" name="password" placeholder="6자 이상" minlength="6" required />
        </div>
        <div class="form-actions">
          <button type="submit">회원가입</button>
        </div>
        <p id="signupStatus" class="form-status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="login.js"></script>
</body>
</html>
